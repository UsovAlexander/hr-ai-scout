version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'fxqmW5H9g0T-3Ia0J-SbHrh2TAQB9nM7G9h1vMktFB0='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'hr-ai-scout-secret'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: 'Europe/Moscow'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Часовой пояс контейнера — Москва, чтобы datetime.now() писал правильное время
    TZ: Europe/Moscow
    # ClickHouse — host.docker.internal ссылается на хост-машину из Docker
    CLICKHOUSE_HOST: host.docker.internal
    CLICKHOUSE_PORT: '9000'
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: '1234'
    CLICKHOUSE_DATABASE: default
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    # Монтируем директорию с парсерами, чтобы DAG-и могли их импортировать
    - ../load_data/parsing_data:/opt/airflow/parsers
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir -r /opt/airflow/parsers/requirements_airflow.txt
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        # Добавляем коннектор ClickHouse через CLI
        airflow connections add 'clickhouse_default' \
          --conn-type 'generic' \
          --conn-host "$${CLICKHOUSE_HOST}" \
          --conn-port "$${CLICKHOUSE_PORT}" \
          --conn-login "$${CLICKHOUSE_USER}" \
          --conn-password "$${CLICKHOUSE_PASSWORD}" \
          --conn-schema "$${CLICKHOUSE_DATABASE}" || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/parsers/requirements_airflow.txt
      && airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/parsers/requirements_airflow.txt
      && airflow scheduler"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
